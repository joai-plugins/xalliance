interface:
  display_name: "xAlliance"
  short_description: "Connect xAlliance to Claude, Codex, and ChatGPT through JoAi's hosted MCP app server."
  icon_small: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/xalliance-black.svg"
  icon_large: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/xalliance-black.svg"
  brand_color: "#4fd1c5"
  default_prompt: "List the xAlliance tools available in this app."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "joai-xalliance"
      description: "xAlliance MCP server by JoAi"
      transport: "streamable_http"
      url: "https://cortex.joai.ai/mcp/apps/xalliance"
